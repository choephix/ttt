name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: docs-web/pnpm-lock.yaml

      - name: Install docs dependencies
        working-directory: docs-web
        run: pnpm install

      - name: Build docs
        working-directory: docs-web
        run: pnpm build

  functional-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binary
        run: make build

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: tests/functional/pnpm-lock.yaml

      - name: Install tui-use
        run: npm install -g tui-use

      - name: Install test dependencies
        working-directory: tests/functional
        run: pnpm install

      - name: Run functional tests
        working-directory: tests/functional
        run: pnpm exec vitest run --reporter=verbose --exclude='**/lsp*.test.js'

  blackbox-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binary
        run: make build

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: tests/blackbox/pnpm-lock.yaml

      - name: Install test dependencies
        working-directory: tests/blackbox
        run: pnpm install

      - name: Run blackbox tests
        working-directory: tests/blackbox
        run: pnpm exec vitest run --reporter=verbose

  lsp-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binary
        run: make build

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: tests/functional/pnpm-lock.yaml

      - name: Install tui-use
        run: npm install -g tui-use

      - name: Install LSP servers
        run: |
          go install golang.org/x/tools/gopls@latest
          npm install -g typescript typescript-language-server
          npm install -g vscode-langservers-extracted
          npm install -g yaml-language-server
          npm install -g svelte-language-server
          pip install pyright
          sudo apt-get install -y clangd

      - name: Install test dependencies
        working-directory: tests/functional
        run: pnpm install

      - name: Run LSP tests
        working-directory: tests/functional
        run: pnpm exec vitest run --reporter=verbose lsp
